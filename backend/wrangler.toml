name = "pet-app-api"
main = "src/index.ts"
compatibility_date = "2026-05-22"

[vars]
APP_ENV = "local"
CORS_ORIGINS = "http://localhost:5173,http://localhost:4173,https://pet-app-admin.pages.dev"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "pet-app-assets"

# Set these with wrangler secrets in real environments:
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
